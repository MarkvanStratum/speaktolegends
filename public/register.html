<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Begin Your Journey — Legend Speak</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-archive: #f4f1ea;
      --marble: #ffffff;
      --gold-legend: #c5a059;
      --blue-deep: #1e293b;
      --text-main: #33302c;
      --text-muted: #8a8276;
      --border-accent: rgba(197, 160, 89, 0.25);
      --radius: 12px;
      --archive-shadow: 0 15px 50px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-archive);
      font-family: "EB Garamond", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: var(--marble);
      width: 100%;
      max-width: 480px;
      padding: 50px 40px;
      border-radius: var(--radius);
      box-shadow: var(--archive-shadow);
      border: 1px solid var(--border-accent);
      text-align: center;
    }

    .logo-mark {
      width: 65px;
      height: 65px;
      background: var(--blue-deep);
      border: 2px solid var(--gold-legend);
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 25px;
      font-family: "Cinzel", serif;
      color: var(--gold-legend);
      font-size: 28px;
      font-weight: bold;
    }

    h1 {
      font-family: "Cinzel", serif;
      font-size: 28px;
      color: var(--blue-deep);
      margin: 0 0 10px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-style: italic;
      color: var(--text-muted);
      margin-bottom: 40px;
      font-size: 19px;
    }

    .tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
    }

    .tab {
      flex: 1;
      padding: 15px;
      cursor: pointer;
      font-family: "Cinzel", serif;
      font-size: 13px;
      color: var(--text-muted);
      transition: 0.3s;
    }

    .tab.active {
      color: var(--gold-legend);
      border-bottom: 2px solid var(--gold-legend);
      font-weight: bold;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-family: "Cinzel", serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: var(--gold-legend);
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-family: inherit;
      font-size: 16px;
      background: #fafafa;
    }

    input:focus {
      outline: none;
      border-color: var(--gold-legend);
      background: white;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: var(--gold-legend);
      color: white;
      border: none;
      border-radius: 6px;
      font-family: "Cinzel", serif;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      background: #b08d4a;
      transform: translateY(-1px);
    }

    .msg {
      margin-top: 20px;
      font-size: 15px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }
    .msg.error { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
    .msg.ok { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

    .hide { display: none; }

    .loader {
      border: 2px solid #f3f3f3;
      border-top: 2px solid var(--gold-legend);
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="logo-mark">L</div>
    <h1>Legend Speak</h1>
    <p class="subtitle">Join the ranks of the enlightened.</p>

    <div class="tabs">
      <div id="tabReg" class="tab active">Create Account</div>
      <div id="tabLog" class="tab">Existing Scholar</div>
    </div>

    <div id="regSection">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="scholar@example.com" />
      </div>
      <div class="form-group">
        <label>Security Cipher</label>
        <input type="password" id="regPassword" placeholder="••••••••" />
      </div>
      <button class="btn" id="regBtn">Enroll in Archive</button>
    </div>

    <div id="loginSection" class="hide">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="scholar@example.com" />
      </div>
      <div class="form-group">
        <label>Security Cipher</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn" id="loginBtn">Access Archives</button>
    </div>

    <div id="msgBox" class="msg"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // TABS SWITCHING
    $("tabReg").onclick = () => {
      $("tabReg").classList.add("active");
      $("tabLog").classList.remove("active");
      $("regSection").classList.remove("hide");
      $("loginSection").classList.add("hide");
      clearMsg();
    };

    $("tabLog").onclick = () => {
      $("tabLog").classList.add("active");
      $("tabReg").classList.remove("active");
      $("loginSection").classList.remove("hide");
      $("regSection").classList.add("hide");
      clearMsg();
    };

    function showMsg(type, text) {
      const box = $("msgBox");
      box.className = "msg " + type;
      box.innerText = text;
      box.style.display = "block";
    }

    function clearMsg() {
      $("msgBox").style.display = "none";
    }

    function setToken(t) { localStorage.setItem("jwt", t); }

    function setBusy(isBusy) {
      const btns = [ $("regBtn"), $("loginBtn") ];
      btns.forEach(b => {
        b.disabled = isBusy;
        if (isBusy) {
          b.innerHTML = '<span class="loader"></span> Processing...';
        } else {
          b.innerHTML = b.id === "regBtn" ? "Enroll in Archive" : "Access Archives";
        }
      });
    }

    // REGISTRATION
    $("regBtn").onclick = async () => {
      clearMsg();
      const email = $("regEmail").value.trim().toLowerCase();
      const password = $("regPassword").value;

      if (!email || !password) {
        showMsg("error", "Email and cipher are required.");
        return;
      }

      setBusy(true);
      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showMsg("error", data.error || "Enrollment failed.");
          setBusy(false);
          return;
        }

        showMsg("ok", "Account established. Initializing access…");

        // Auto-login or redirect
        setTimeout(() => {
          window.location.href = "/pricing.html";
        }, 1000);

      } catch (err) {
        showMsg("error", "The archive server is unresponsive.");
      } finally {
        setBusy(false);
      }
    };

    // LOGIN
    $("loginBtn").onclick = async () => {
      clearMsg();
      const email = $("loginEmail").value.trim().toLowerCase();
      const password = $("loginPassword").value;

      if (!email || !password) {
        showMsg("error", "Email and cipher are required.");
        return;
      }

      setBusy(true);
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.token) {
          showMsg("error", data.error || "Access denied.");
          setBusy(false);
          return;
        }

        setToken(data.token);
        showMsg("ok", "Identity verified. Redirecting…");

        setTimeout(() => {
          window.location.href = "/";
        }, 800);

      } catch (err) {
        showMsg("error", "Connection to the archive lost.");
      } finally {
        setBusy(false);
      }
    };
  </script>

</body>
</html>
